name: Cleanup merged branch
on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref != 'next' && github.event.pull_request.head.ref != 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Delete branch
        run: git push origin --delete "${{ github.event.pull_request.head.ref }}"
