name: Benchmark
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version:
          - stable
          - nightly
      fail-fast: false
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.version }}
      - name: cache
        uses: Swatinem/rust-cache@v2
      - name: run benchmark
        run: cargo bench 2>&1 | tee bench_output.txt
      - name: tabularize results
        env:
          VERSION: ${{ matrix.version }}
        run: |
          python3 << 'PYEOF'
import os, re

with open("bench_output.txt") as f:
    content = f.read()

entries = []
current_name = None
skip_prefixes = ("Found", "Change", "time:", "Warning", "Benchmarking", "Gnuplot", "criterion", "Generating")

for line in content.split("\n"):
    stripped = line.strip()
    if not stripped:
        continue
    if not line.startswith((" ", "\t")) and re.match(r"^[a-zA-Z_]", stripped) and not any(stripped.startswith(p) for p in skip_prefixes):
        current_name = stripped
    elif stripped.startswith("time:") and "[" in stripped:
        if current_name:
            m = re.search(r"\[([\d.]+\s+\S+)\s+([\d.]+\s+\S+)\s+([\d.]+\s+\S+)\]", stripped)
            if m:
                entries.append((current_name, m.group(1), m.group(2), m.group(3)))
                current_name = None

summary_path = os.environ["GITHUB_STEP_SUMMARY"]
with open(summary_path, "a") as f:
    f.write(f"## Benchmark Results ({os.environ['VERSION']})\n\n")
    f.write("| Benchmark | Min | Mean | Max |\n")
    f.write("|---|---|---|---|\n")
    for name, mn, mean, mx in entries:
        f.write(f"| {name} | {mn} | {mean} | {mx} |\n")
PYEOF
      - uses: actions/upload-artifact@v4
        with:
          name: report ${{ matrix.version }}
          path: report/
