name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'
jobs:
  crates:
    if: github.repository_owner == 'liberocks'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: publish package to crates
        run: |
          cargo package
          cargo publish --token ${{ secrets.CARGO_TOKEN }}
