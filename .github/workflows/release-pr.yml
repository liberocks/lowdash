name: Release PR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      pr_title:
        description: "Pull request title (defaults to release name)"
      pr_body:
        description: "Pull request body (defaults to release notes)"

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR from next to master
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ inputs.pr_title || github.event.release.name }}
          PR_BODY: ${{ inputs.pr_body || github.event.release.body }}
        run: |
          gh pr create \
            --base master \
            --head next \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            || echo "PR may already exist, continuing..."


