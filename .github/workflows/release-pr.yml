name: Release PR

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create PR from next to master
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.release.name }}
          PR_BODY: ${{ github.event.release.body }}
        run: |
          gh pr create \
            --base master \
            --head next \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            || echo "PR may already exist, continuing..."


