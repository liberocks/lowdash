name: Release PR

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR from next to master
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.release.name }}
          PR_BODY: ${{ github.event.release.body }}
        run: |
          gh pr create \
            --base master \
            --head next \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            || echo "PR may already exist, continuing..."

      - name: Merge to master
        run: |
          git checkout master
          git merge origin/next --no-edit
          git push origin master

      - name: Rebase next from master
        run: |
          git checkout next
          git rebase master
          git push origin next --force-with-lease
